  <!-- Clickjacking Security Enforcer -->
  <script nonce="secureTipsGatewayNonce">
    (function() {
      if (window.self !== window.top) {
        const allowedAncestors = ["sites.google.com", "googleusercontent.com"];
        try {
          const parentUrl = document.referrer;
          const isAllowed = allowedAncestors.some(function(domain) {
            return parentUrl.includes(domain);
          });
          if (!isAllowed) {
            document.body.innerHTML = "<div style='padding: 32px; text-align: center; color: #ef4444; font-weight: bold; font-family: sans-serif;'>ความปลอดภัยขัดข้อง: ไม่อนุญาตให้เชื่อมต่อภายนอกผ่าน iframe ค่ะ</div>";

        }
      }
    })();
  </script>

  <script nonce="secureTipsGatewayNonce">
    let activeSessionToken = "";
    let isSessionReady = false;
    
    const POW_DIFFICULTY = parseInt("<?= Utils.encodeHtmlEntities(powDifficulty) ?>", 10) || 3;

    function getClientFingerprint() {
      let fp = localStorage.getItem("client_fp");
      if (!fp) {
        const array = new Uint32Array(4);
        window.crypto.getRandomValues(array);
        const cryptRandomStr = Array.from(array).map(b => b.toString(36)).join('');
        fp = "fp_" + cryptRandomStr + "_" + new Date().getTime();
        localStorage.setItem("client_fp", fp);
      }
      return fp;
    }

    async function solveProofOfWork(fingerprint, timestamp, difficulty = 3) {
      let nonce = 0;
      const prefix = "0".repeat(difficulty);
      const encoder = new TextEncoder();
      
      while (true) {
        const data = encoder.encode(fingerprint + "_" + timestamp + "_" + nonce);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        
        if (hashHex.startsWith(prefix)) {
          return nonce;
        }
        nonce++;
      }
    }

    function setStepUI(step) {
      const step1Circles = document.querySelectorAll('.gjs-step-circle-1');
      const step1Texts = document.querySelectorAll('.gjs-step-text-1');
      const step2Circles = document.querySelectorAll('.gjs-step-circle-2');
      const step2Texts = document.querySelectorAll('.gjs-step-text-2');

      step1Circles.forEach(circle => {
        if (circle) {
          if (step === 1) {
            circle.classList.remove('gjs-step-inactive');
            circle.classList.add('gjs-step-active');
          } else {
            circle.classList.remove('gjs-step-active');
            circle.classList.add('gjs-step-inactive');
          }
        }
      });

      step1Texts.forEach(text => {
        if (text) text.style.color = (step === 1) ? '#f1f5f9' : '#cbd5e1';
      });

      step2Circles.forEach(circle => {
        if (circle) {
          if (step === 2) {
            circle.classList.remove('gjs-step-inactive');
            circle.classList.add('gjs-step-active');
          } else {
            circle.classList.remove('gjs-step-active');
            circle.classList.add('gjs-step-inactive');
          }
        }
      });

      step2Texts.forEach(text => {
        if (text) text.style.color = (step === 2) ? '#f1f5f9' : '#cbd5e1';
      });
    }

    function toggleSubmitButton() {
      const consentCheckbox = document.getElementById('pdpa-consent');
      const submitBtn = document.getElementById('submit-btn');
      if (!submitBtn) return;

      if (isSessionReady && consentCheckbox && consentCheckbox.checked) {
        submitBtn.disabled = false;
        submitBtn.textContent = "สร้าง PromptPay QR";
      } else {
        submitBtn.disabled = true;
        if (!isSessionReady) {
          submitBtn.textContent = "กำลังยืนยันความปลอดภัยช่องทาง...";
        } else {
          submitBtn.textContent = "โปรดยินยอมเงื่อนไขการส่งข้อมูลและข้อตกลง";
        }
      }
    }

    async function refreshSession() {
      isSessionReady = false;
      activeSessionToken = "";
      const submitBtn = document.getElementById('submit-btn');
      if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.textContent = "กำลังยืนยันความปลอดภัยช่องทาง...";
      }
      
      const clientFp = getClientFingerprint();
      const clientTimestamp = new Date().getTime().toString();
      
      try {
        const clientNonce = await solveProofOfWork(clientFp, clientTimestamp, POW_DIFFICULTY);
        executeScriptWithRetry("initializeSession", [clientFp, clientTimestamp, clientNonce], 3, 1000)
          .then(function(res) {
            if (res.success && res.sessionToken) {
              activeSessionToken = res.sessionToken;
              isSessionReady = true;
              toggleSubmitButton();
            } else {
              showError(res.message || "การเชื่อมโยงรักษาความปลอดภัยล้มเหลว กรุณาโหลดหน้าเว็บใหม่อีกครั้งนะคะ");
            }
          })
          .catch(function() {
            showError("ระบบหลังบ้านไม่ว่างชั่วคราว กรุณารอแป๊บนึงแล้วลองใหม่อีกครั้งค่ะ");
          });
      } catch (err) {
        showError("การประมวลผลความปลอดภัยฝั่งเบราว์เซอร์ล้มเหลวค่ะ");
      }
    }

    async function submitDonation() {
      const errorBanner = document.getElementById('error-banner');
      if (errorBanner) errorBanner.classList.add('hidden');

      const consentCheckbox = document.getElementById('pdpa-consent');
      if (consentCheckbox && !consentCheckbox.checked) {
        showError("คุณต้องกดยอมรับเงื่อนไขเพื่อดำเนินการต่อค่ะ");
        return;
      }

      if (!activeSessionToken) {
        showError("ไม่พบโทเค็นเชื่อมต่อ กรุณารอสักครู่เพื่อให้ระบบจัดสรรสิทธิ์นะคะ");
        return;
      }

      const nicknameInput = document.getElementById('nickname');
      const messageInput = document.getElementById('message');
      const amountInput = document.getElementById('amount');

      const rawNickname = nicknameInput ? nicknameInput.value : '';
      const rawMessage = messageInput ? messageInput.value : '';
      const rawAmount = amountInput ? parseFloat(amountInput.value) : NaN;

      const cleanNickname = DOMPurify.sanitize(rawNickname).trim();
      const cleanMessage = DOMPurify.sanitize(rawMessage).trim();

      if (cleanNickname.length < 2 || cleanNickname.length > 25) {
        showError("ชื่อเล่นสำหรับขึ้นจอภาพต้องมีขนาดระหว่าง 2 ถึง 25 ตัวอักษรค่ะ");
        return;
      }
      if (cleanMessage.length > 100) {
        showError("ข้อความอวยพร/สนับสนุนต้องไม่ยาวเกิน 100 ตัวอักษรค่ะ");
        return;
      }
      if (isNaN(rawAmount) || rawAmount < 1.00 || rawAmount > 700000.00) {
        showError("จำนวนเงินสนับสนุนต้องอยู่ระหว่าง 1.00 ถึง 700,000.00 บาทค่ะ");
        return;
      }

      setStepUI(2);

      const formContainer = document.getElementById('form-container');
      const loadingContainer = document.getElementById('loading-container');
      
      if (formContainer) formContainer.classList.add('hidden');
      if (loadingContainer) loadingContainer.classList.remove('hidden');

      const payload = {
        sessionToken: activeSessionToken,
        nickname: cleanNickname,
        message: cleanMessage,
        amount: rawAmount,
        pdpaConsent: consentCheckbox ? consentCheckbox.checked : false
      };

      executeScriptWithRetry("createPayment", payload, 3, 1000)
        .then(onPaymentSuccess)
        .catch(onPaymentError);
    }

    function onPaymentSuccess(response) {
      const loadingContainer = document.getElementById('loading-container');
      const formContainer = document.getElementById('form-container');
      const qrContainer = document.getElementById('qr-container');
      
      if (loadingContainer) loadingContainer.classList.add('hidden');
      
      if (!response.success) {
        showError(response.message);
        setStepUI(1);
        refreshSession();
        if (formContainer) formContainer.classList.remove('hidden');
        return;
      }

      const displayAmt = document.getElementById('display-amount');
      if (displayAmt) displayAmt.textContent = parseFloat(response.amount).toFixed(2);
      
      try {
        const qrContainerElement = document.getElementById('qr-code-container');
        if (qrContainerElement) {
          qrContainerElement.innerHTML = ""; 
          
          const qrCode = new QRCodeStyling({
            width: 240,
            height: 240,
            type: "svg", 
            data: response.qr_string,
            dotsOptions: {
              color: "#0f172a",
              type: "rounded"
            },
            backgroundOptions: {
              color: "#ffffff"
            },
            cornersSquareOptions: {
              type: "extra-rounded"
            },
            cornersDotOptions: {
              type: "dot"
            }
          });
          
          qrCode.append(qrContainerElement);
          if (qrContainer) {
            qrContainer.classList.remove('hidden');
            
            // ♿ Accessible Focus Reset to Step 2 Header
            const qrTitle = qrContainer.querySelector('.gjs-qr-title');
            if (qrTitle) {
              qrTitle.setAttribute('tabindex', '-1');
              qrTitle.focus();
            }
          }
        } else {
          throw new Error("Unable to identify target QR injection container on screen.");
        }
      } catch (err) {
        showError("การผลิตภาพรหัสชำระเงินขัดข้อง กรุณาลองใหม่อีกครั้งค่ะ");
        setStepUI(1);
        if (formContainer) formContainer.classList.remove('hidden');
      }
    }

    function onPaymentError(err) {
      const loadingContainer = document.getElementById('loading-container');
      const formContainer = document.getElementById('form-container');
      
      if (loadingContainer) loadingContainer.classList.add('hidden');
      showError(err.message || "การซิงโครไนซ์ธุรกรรมกับระบบชำระเงินขัดข้อง โปรดลองอีกครั้งนะคะ");
      setStepUI(1);
      refreshSession();
      if (formContainer) formContainer.classList.remove('hidden');
    }

    function executeScriptWithRetry(functionName, args, retriesLeft, currentDelay) {
      return new Promise((resolve, reject) => {
        const runner = google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(function(err) {
            if (retriesLeft > 0) {
              const jitter = Math.random() * 400;
              const maxDelay = 5000;
              const nextDelay = Math.min(maxDelay, (currentDelay * 1.5) + jitter);
              console.warn(`[RETRY] Downstream link unstable. Re-syncing in ${Math.round(nextDelay)}ms...`);
              setTimeout(() => {
                executeScriptWithRetry(functionName, args, retriesLeft - 1, nextDelay)
                  .then(resolve)
                  .catch(reject);
              }, nextDelay);
            } else {
              reject(err);
            }
          });

        if (args !== undefined && args !== null) {
          if (Array.isArray(args)) {
            runner[functionName](...args);
          } else {
            runner[functionName](args);
          }
        } else {
          runner[functionName]();
        }
      });
    }

    function showError(msg) {
      const banner = document.getElementById('error-banner');
      if (banner) {
        banner.textContent = DOMPurify.sanitize(msg);
        banner.classList.remove('hidden');
        banner.focus();
      } else {
        alert(DOMPurify.sanitize(msg)); 
      }
    }

    window.resetForm = function() {
      const form = document.getElementById('donation-form');
      if (form) form.reset();
      
      const counter = document.getElementById('char-counter');
      if (counter) counter.textContent = "0/100";
      
      setStepUI(1);
      
      const qrContainer = document.getElementById('qr-container');
      const formContainer = document.getElementById('form-container');
      const errorBanner = document.getElementById('error-banner');
      
      if (qrContainer) qrContainer.classList.add('hidden');
      if (formContainer) {
        formContainer.classList.remove('hidden');
        
        const formTitle = formContainer.querySelector('.gjs-form-title');
        if (formTitle) {
          formTitle.setAttribute('tabindex', '-1');
          formTitle.focus();
        }
      }
      if (errorBanner) errorBanner.classList.add('hidden');
      
      refreshSession();
    };

    window.addEventListener('DOMContentLoaded', function() {
      const messageInput = document.getElementById('message');
      const donationForm = document.getElementById('donation-form');
      const pdpaConsent = document.getElementById('pdpa-consent');

      if (messageInput) {
        messageInput.addEventListener('input', function(e) {
          const counter = document.getElementById('char-counter');
          if (counter) {
            counter.textContent = `${e.target.value.length}/100`;
          }
        });
      }
      
      if (donationForm) {
        donationForm.addEventListener('submit', function(e) {
          e.preventDefault();
          submitDonation();
        });
      }
      
      if (pdpaConsent) {
        pdpaConsent.addEventListener('change', toggleSubmitButton);
      }

      // 🛡️ Safe Event Delegation for CSP compliance (Zero inline JS)
      document.querySelectorAll('.gjs-form-preset-btn').forEach(function(button) {
        button.addEventListener('click', function() {
          const val = this.getAttribute('data-preset');
          const amountInput = document.getElementById('amount');
          if (amountInput) {
            amountInput.value = val;
            toggleSubmitButton();
          }
        });
      });

      const backBtn = document.getElementById('back-btn');
      if (backBtn) {
        backBtn.addEventListener('click', function() {
          resetForm();
        });
      }

      refreshSession();
    });
  </script>
