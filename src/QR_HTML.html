<div class="gjs-qr-wrapper">
  <div class="gjs-qr-card">
    
    <div class="gjs-qr-header">
      <!-- ♿ Screen-Reader Accessible Alert Title -->
      <h2 class="gjs-qr-title" aria-live="polite">สแกนชำระเงินสนับสนุน</h2>
      <p class="gjs-qr-subtitle">ใช้แอปพลิเคชันธุรกรรมบนสมาร์ทโฟนเพื่อตรวจสแกนรหัสคิวอาร์และชำระยอดได้ทันทีค่ะ</p>
    </div>

    <div class="gjs-qr-steps" role="navigation" aria-label="Donation steps">
      <div class="gjs-qr-step-item">
        <span class="gjs-qr-step-number gjs-step-circle-1 gjs-step-inactive">1</span>
        <span class="gjs-step-text-1" style="color: #cbd5e1;">กรอกข้อมูล</span>
      </div>
      <div style="flex-grow: 1; height: 1px; background-color: #1e293b; margin: 0 12px;"></div>
      <div class="gjs-qr-step-item">
        <span class="gjs-qr-step-number gjs-step-circle-2 gjs-step-active">2</span>
        <span class="gjs-step-text-2" style="color: #f1f5f9; font-weight: 600;">รับรหัส QR</span>
      </div>
    </div>

    <div class="gjs-qr-box">
      <div id="qr-code-container" class="gjs-qr-canvas-wrapper">
        <!-- SVG elements injected here dynamically via qr-code-styling -->
      </div>
      
      <div>
        <p class="gjs-qr-amount-text">
          ยอดที่ต้องสแกนจ่าย: <span id="display-amount" class="gjs-qr-amount-display">0.00</span> บาท
        </p>
        <p class="gjs-qr-notice">
          รหัสภาพนี้ทำระบบสเปกปิด ข้อมูลส่วนตัวเลขบัญชีจริงและชื่อจริงของคุณจะไม่ถูกนำไปพิจารณาเก็บคลังข้อมูลหรือขึ้นประวัติบนสกรีนค่ะ
        </p>
      </div>

      <button type="button" id="back-btn" class="gjs-qr-back-btn">
        กลับหน้าหลักเพื่อทำรายการเพิ่มเติม
      </button>
    </div>

  </div>
</div>
